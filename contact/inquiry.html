<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교육기관 문의 | 엔앤씨</title>
  <link rel="shortcut icon" href="https://nncplus.com/data/banner/uHkqmmwMDtySDAetmLxUS9JCPSBcPX.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    window.PAGE_CONFIG = {
      root: '../', activeSection: 'contact', activePage: 'inquiry',
      crumb: '교육기관 문의', pageEyebrow: 'Inquiry',
      pageTitle: '교육기관 <span class="hl">문의</span>',
      pageDesc: '서비스 도입을 검토 중인 교육기관의 문의를 받습니다'
    };
  </script>
  <script src="../_layout.js"></script>
  <style>
    .inquiry-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 48px;
      align-items: start;
    }
    @media(max-width: 1024px) { .inquiry-layout { grid-template-columns: 1fr; } }

    /* Form */
    .form-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 36px;
    }
    @media(max-width: 768px) { .form-card { padding: 24px 20px; } }

    .form-row { margin-bottom: 22px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
    @media(max-width: 640px) { .form-row-2 { grid-template-columns: 1fr; } }

    .form-label {
      display: block; font-size: 12px; font-weight: 700;
      letter-spacing: .06em; color: rgba(255,255,255,0.5);
      text-transform: uppercase; font-family: var(--font-en);
      margin-bottom: 8px;
    }
    .form-label .req { color: var(--blue); margin-left: 2px; }

    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff; font-size: 14px;
      font-family: var(--font-ko), sans-serif;
      transition: border-color .2s, background .2s;
      outline: none; box-sizing: border-box;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,0.2); }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--blue);
      background: rgba(26,107,255,0.06);
    }
    .form-select { cursor: pointer; appearance: none; }
    .form-select option { background: #0a1628; }
    .form-textarea { resize: vertical; min-height: 140px; line-height: 1.7; }

    .form-check-group { display: flex; flex-direction: column; gap: 10px; }
    .form-check {
      display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
    }
    .form-check input[type="checkbox"] { width: 16px; height: 16px; margin-top: 1px; accent-color: var(--blue); flex-shrink: 0; }
    .form-check-label { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; }
    .form-check-label a { color: var(--accent); text-decoration: none; }
    .form-check-label a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%; padding: 16px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: opacity .2s, transform .15s;
    }
    .btn-submit:hover { opacity: .88; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    /* Sidebar */
    .sidebar-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      position: sticky;
      top: 88px;
    }
    @media(max-width: 1024px) { .sidebar-card { position: static; } }

    .sidebar-title {
      font-size: 14px; font-weight: 700;
      color: rgba(255,255,255,0.7); margin-bottom: 20px;
      padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .contact-item {
      display: flex; gap: 14px; margin-bottom: 20px; align-items: flex-start;
    }
    .contact-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: rgba(26,107,255,0.15); border: 1px solid rgba(26,107,255,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--blue);
    }
    .contact-label { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 3px; font-family: var(--font-en); letter-spacing: .06em; }
    .contact-value { font-size: 14px; color: rgba(255,255,255,0.8); font-weight: 500; }
    .contact-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 2px; }

    .process-list { margin-top: 28px; }
    .process-title {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      color: rgba(255,255,255,0.3); text-transform: uppercase;
      font-family: var(--font-en); margin-bottom: 16px;
    }
    .process-step {
      display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start;
    }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      background: rgba(26,107,255,0.2); border: 1px solid rgba(26,107,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: var(--blue); font-family: var(--font-en);
    }
    .step-text { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.5; padding-top: 3px; }
    .step-text strong { color: rgba(255,255,255,0.75); font-weight: 600; }

    .success-msg {
      display: none; text-align: center; padding: 40px 20px;
    }
    .success-msg .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-msg h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .success-msg p { font-size: 14px; color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
<main id="page-main">
  <div class="inquiry-layout">

    <!-- 문의 폼 -->
    <div class="form-card">
      <form id="inquiry-form">
        <div class="form-row-2">
          <div>
            <label class="form-label">기관명 <span class="req">*</span></label>
            <input class="form-input" type="text" placeholder="○○ 어린이집" required>
          </div>
          <div>
            <label class="form-label">기관 유형 <span class="req">*</span></label>
            <select class="form-select" required>
              <option value="" disabled selected>선택해 주세요</option>
              <option>어린이집</option>
              <option>유치원</option>
              <option>초등학교</option>
              <option>기타 교육기관</option>
            </select>
          </div>
        </div>

        <div class="form-row-2">
          <div>
            <label class="form-label">담당자 성함 <span class="req">*</span></label>
            <input class="form-input" type="text" placeholder="홍길동" required>
          </div>
          <div>
            <label class="form-label">직책</label>
            <input class="form-input" type="text" placeholder="원장 / 교사 등">
          </div>
        </div>

        <div class="form-row-2">
          <div>
            <label class="form-label">연락처 <span class="req">*</span></label>
            <input class="form-input" type="tel" placeholder="010-0000-0000" required>
          </div>
          <div>
            <label class="form-label">이메일</label>
            <input class="form-input" type="email" placeholder="example@email.com">
          </div>
        </div>

        <div class="form-row">
          <label class="form-label">기관 주소 <span class="req">*</span></label>
          <input class="form-input" type="text" placeholder="시/도, 시/군/구까지 입력해 주세요" required>
        </div>

        <div class="form-row-2">
          <div>
            <label class="form-label">원아 수</label>
            <select class="form-select">
              <option value="" disabled selected>선택해 주세요</option>
              <option>20명 미만</option>
              <option>20~50명</option>
              <option>50~100명</option>
              <option>100명 이상</option>
            </select>
          </div>
          <div>
            <label class="form-label">희망 서비스</label>
            <select class="form-select">
              <option value="" disabled selected>선택해 주세요</option>
              <option>식판 렌탈 + 세척</option>
              <option>세척 전용</option>
              <option>아직 미정</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <label class="form-label">문의 내용</label>
          <textarea class="form-textarea" placeholder="궁금하신 점을 자유롭게 작성해 주세요."></textarea>
        </div>

        <div class="form-row">
          <div class="form-check-group">
            <label class="form-check">
              <input type="checkbox" required>
              <span class="form-check-label">[필수] 개인정보 수집 및 이용에 동의합니다. <a href="#">개인정보처리방침 보기</a></span>
            </label>
            <label class="form-check">
              <input type="checkbox">
              <span class="form-check-label">[선택] 마케팅 정보 수신에 동의합니다. (이벤트·할인 정보 등)</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-submit">문의 접수하기</button>
      </form>

      <div class="success-msg" id="success-msg">
        <div class="success-icon">✅</div>
        <h3>문의가 접수되었습니다</h3>
        <p>담당자가 1~2 영업일 내에 연락드리겠습니다.<br>감사합니다.</p>
      </div>
    </div>

    <!-- 사이드바 -->
    <div>
      <div class="sidebar-card">
        <div class="sidebar-title">직접 연락하기</div>

        <div class="contact-item">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.58 3.58 2 2 0 0 1 3.55 1.37h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div>
            <div class="contact-label">Phone</div>
            <div class="contact-value">010-0000-0000</div>
            <div class="contact-sub">평일 09:00 – 18:00</div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <div class="contact-label">Email</div>
            <div class="contact-value">info@nncplus.com</div>
            <div class="contact-sub">24시간 접수 가능</div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <div class="contact-label">Address</div>
            <div class="contact-value">경기도 안성시</div>
            <div class="contact-sub">본사 위치</div>
          </div>
        </div>

        <div class="process-list">
          <div class="process-title">도입 프로세스</div>
          <div class="process-step">
            <div class="step-num">1</div>
            <div class="step-text"><strong>문의 접수</strong><br>온라인 또는 전화 문의</div>
          </div>
          <div class="process-step">
            <div class="step-num">2</div>
            <div class="step-text"><strong>현장 방문 상담</strong><br>담당자 방문 및 니즈 파악</div>
          </div>
          <div class="process-step">
            <div class="step-num">3</div>
            <div class="step-text"><strong>계약 체결</strong><br>서비스 플랜 확정 및 계약</div>
          </div>
          <div class="process-step">
            <div class="step-num">4</div>
            <div class="step-text"><strong>서비스 시작</strong><br>수거·세척·배송 시작</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>
<script>
  document.getElementById('inquiry-form').addEventListener('submit', function(e) {
    e.preventDefault();
    this.style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  });
</script>
</body>
</html>
